<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Bible · Aatif Nafees</title>
  <style>
    :root {
      --bg: #07070E; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
      --gold: #E8C547; --teal: #3ECFCF; --red: #E85D47;
      --text: #F0EDE8; --muted: #777; --dim: #444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia','Times New Roman',serif; min-height: 100vh; }
    .header { padding: 40px 24px 0; max-width: 780px; margin: 0 auto; }
    .eyebrow { font-size: 10px; letter-spacing: 4px; color: var(--dim); text-transform: uppercase; margin-bottom: 14px; }
    h1 { font-size: clamp(24px,5vw,38px); font-weight: 400; line-height: 1.25; letter-spacing: -0.5px; margin-bottom: 8px; }
    .stats { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
    .stat-val { font-size: 18px; color: var(--gold); font-family: monospace; }
    .stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    .tab-bar { max-width: 780px; margin: 28px auto 0; padding: 0 24px; }
    .tab-bar-inner { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .tab-bar-inner::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 9px 16px; border-radius: 8px; border: none; white-space: nowrap; background: var(--surface); color: var(--muted); cursor: pointer; font-size: 12px; font-family: monospace; letter-spacing: 0.5px; transition: all .15s; font-weight: 400; }
    .tab-btn.active { background: var(--gold); color: var(--bg); font-weight: 700; }
    .content { max-width: 780px; margin: 0 auto; padding: 24px 24px 60px; }
    .callout { border-radius: 14px; padding: 22px; margin-bottom: 24px; }
    .callout-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
    .callout-title { font-size: 15px; margin-bottom: 8px; }
    .callout-body { font-size: 13px; color: var(--muted); line-height: 1.7; }
    .phase-card { display: flex; gap: 20px; margin-bottom: 16px; padding: 22px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); }
    .phase-num { font-size: 32px; font-family: monospace; opacity: .4; line-height: 1; min-width: 40px; }
    .phase-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .phase-period { font-size: 11px; font-family: monospace; padding: 3px 10px; border-radius: 100px; }
    .cred-card { margin-bottom: 10px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); cursor: pointer; overflow: hidden; transition: border-color .2s; }
    .cred-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .cred-tags { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
    .tag-pill { padding: 2px 10px; border-radius: 100px; font-size: 10px; letter-spacing: 1.5px; font-family: monospace; }
    .cred-name { font-size: 15px; margin-bottom: 4px; }
    .cred-brand { font-size: 12px; color: var(--muted); }
    .cred-body { padding: 0 20px 20px; border-top: 1px solid var(--border); display: none; }
    .cred-body.open { display: block; }
    .sect-label { font-size: 10px; letter-spacing: 2px; color: var(--dim); margin-bottom: 6px; margin-top: 16px; text-transform: uppercase; }
    .cred-link { font-size: 13px; color: var(--teal); font-family: monospace; text-decoration: none; word-break: break-all; }
    .cred-link:hover { text-decoration: underline; }
    .budget-wrap { padding: 16px 20px; background: var(--surface); border-radius: 10px; margin-bottom: 24px; border: 1px solid var(--border); }
    .budget-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .budget-track { height: 6px; background: var(--border); border-radius: 100px; overflow: hidden; }
    .budget-fill { height: 100%; background: linear-gradient(90deg,var(--gold),var(--teal)); border-radius: 100px; }
    .month-card { margin-bottom: 10px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); cursor: pointer; overflow: hidden; }
    .month-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .month-body { border-top: 1px solid var(--border); display: none; }
    .month-body.open { display: block; }
    .time-slot { padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .slot-label { font-size: 11px; letter-spacing: 2px; font-family: monospace; margin-bottom: 12px; }
    .slot-item { display: flex; gap: 10px; margin-bottom: 10px; }
    .slot-arrow { font-size: 10px; margin-top: 4px; min-width: 8px; }
    .slot-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .sat-block { padding: 14px 20px; border-bottom: 1px solid var(--border); background: rgba(129,140,248,.05); }
    .sun-block { padding: 14px 20px; border-bottom: 1px solid var(--border); background: rgba(249,115,22,.05); }
    .win-row { padding: 14px 20px; display: flex; gap: 8px; align-items: center; }
    .sched-slot { margin-bottom: 16px; padding: 24px; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); }
    .rhythm-card { padding: 22px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 16px; }
    .rhythm-row { display: flex; gap: 16px; margin-bottom: 14px; align-items: flex-start; }
    .li-card { padding: 22px; background: rgba(62,207,207,.06); border-radius: 14px; border: 1px solid rgba(62,207,207,.15); }
    .li-row { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
    .income-card { padding: 24px; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
    .income-row { margin-bottom: 16px; }
    .income-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .income-track { height: 5px; background: var(--border); border-radius: 100px; overflow: hidden; }
    .income-fill { height: 100%; border-radius: 100px; }
    .iitm-card { padding: 24px; background: rgba(249,115,22,.07); border-radius: 16px; border: 1px solid rgba(249,115,22,.2); margin-bottom: 20px; }
    .subject-card { padding: 12px 14px; background: rgba(0,0,0,.3); border-radius: 8px; margin-bottom: 10px; }
    .subject-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .iitm-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .iitm-meta-card { padding: 12px; background: rgba(0,0,0,.3); border-radius: 8px; }
    .dev-card { padding: 24px; background: rgba(192,132,252,.07); border-radius: 16px; border: 1px solid rgba(192,132,252,.2); margin-bottom: 20px; }
    .traj-row { display: flex; gap: 14px; margin-bottom: 12px; padding: 14px; background: rgba(0,0,0,.2); border-radius: 8px; }
    .traj-phase { min-width: 90px; flex-shrink: 0; }
    .toolkit-card { padding: 22px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 16px; }
    .toolkit-pill { padding: 6px 14px; border-radius: 100px; border: 1px solid rgba(192,132,252,.3); color: #C084FC; font-size: 12px; font-family: monospace; display: inline-block; margin: 4px; }
    .companies-card { padding: 22px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); }
    .company-pill { padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-family: monospace; display: inline-block; margin: 4px; }
    .triggers-card { padding: 22px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 20px; }
    .trigger-row { display: flex; gap: 14px; margin-bottom: 14px; align-items: flex-start; }
    .trigger-label { padding: 3px 10px; border-radius: 100px; font-size: 11px; font-family: monospace; min-width: 80px; text-align: center; flex-shrink: 0; }
    .headline-card { margin-bottom: 20px; padding: 22px; background: linear-gradient(135deg,rgba(232,197,71,.1),rgba(62,207,207,.05)); border-radius: 14px; border: 1px solid rgba(232,197,71,.2); }
    .north-star { padding: 22px; background: rgba(255,255,255,.02); border-radius: 14px; border: 1px dashed var(--dim); }
    .eyebrow-sm { font-size: 10px; letter-spacing: 3px; color: var(--dim); margin-bottom: 16px; text-transform: uppercase; }
    @media(max-width:480px){.phase-card{flex-direction:column;gap:10px}.iitm-meta-grid{grid-template-columns:1fr}.traj-row{flex-direction:column;gap:8px}}
  </style>
</head>

function credentials(){

const tabs = [
  {label:'Overview',fn:overview},
  {label:'Credentials',fn:credentials},
  {label:'Month by Month',fn:monthly},
  {label:'Daily Schedule',fn:schedule},
  {label:'Endgame',fn:endgame},
];

function tCred(i){ openCred = openCred===i ? null : i; render(); }
function tMonth(i){ openMonth = openMonth===i ? -1 : i; render(); }
function switchTab(i){ tab=i; openCred=null; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function render(){
  document.getElementById('tabBar').innerHTML = tabs.map((t,i)=>
    `<button class="tab-btn${tab===i?' active':''}" onclick="switchTab(${i})">${t.label}</button>`).join('');
  document.getElementById('content').innerHTML = tabs[tab].fn();
}

render();
</script>
